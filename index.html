<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>숲을 위한 씨앗 해낭문학회</title>

<!-- 외부 웹 폰트 로드 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500&family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<!-- ePub.js 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

<style>
  :root {
    --bg-color: #FBF9F6;
    --text-primary: #2C2A28;
    --text-secondary: #8B8680;
    --accent: #3A5A4C;
    --accent-hover: #264035;
    --border-color: #E8E3DB;
    --toolbar-bg: rgba(251, 249, 246, 0.92);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg-color);
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  button, select { font-family: inherit; outline: none; }

  /* ---------- 서재 (책장) UI ---------- */
  #library {
    padding: 5rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  
  /* 헤더 여백 대폭 축소 */
  #library-header {
    text-align: center;
    margin-bottom: 3rem;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 1.2rem;
  }

  #library-header .subtitle {
    font-family: 'Gowun Batang', serif;
    font-size: 1.15rem;
    color: var(--accent);
    margin: 0 0 0.5rem 0;
    letter-spacing: 0.05em;
  }
  
  #library-header h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 2.5rem;
    margin: 0;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  /* 재능기부 문구 우측 정렬 및 간격 축소 */
  #library-header .credit {
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 0.85rem;
    color: var(--text-secondary);
    text-align: right;
    margin: 0.5rem 0 0 0;
    letter-spacing: 0.05em;
  }

  .bookshelf {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 4rem 2.5rem;
  }

  .book-card {
    cursor: pointer;
    text-align: left;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .book-card:hover { transform: translateY(-10px); }

  .book-cover {
    width: 100%; aspect-ratio: 2 / 3; object-fit: cover;
    border-radius: 2px 7px 7px 2px;
    box-shadow: 
      inset 4px 0 12px rgba(0,0,0,0.08),
      inset -1px 0 2px rgba(255,255,255,0.5),
      5px 10px 20px rgba(0,0,0,0.06);
    margin-bottom: 1.2rem; background-color: #E8E8E8;
    transition: box-shadow 0.4s ease;
  }
  
  .book-card:hover .book-cover {
    box-shadow: 
      inset 4px 0 12px rgba(0,0,0,0.08),
      inset -1px 0 2px rgba(255,255,255,0.5),
      8px 18px 30px rgba(0,0,0,0.12);
  }

  .book-title {
    font-family: 'Noto Serif KR', serif;
    font-weight: 500; font-size: 1.05rem; margin: 0 0 0.4rem 0;
    line-height: 1.4; word-break: keep-all; color: var(--text-primary);
  }

  .book-author { font-size: 0.85rem; color: var(--text-secondary); margin: 0; }

  /* ---------- Reader shell (책 읽기 화면) ---------- */
  #reader-shell {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    background: var(--bg-color);
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 100;
  }
  #reader-shell.visible { transform: translateY(0); }

  header.toolbar {
    display: flex; flex-wrap: nowrap; align-items: center;
    padding: 0.8rem 1.2rem; background: var(--toolbar-bg);
    border-bottom: 1px solid var(--border-color); 
    gap: 0.8rem; z-index: 10;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    backdrop-filter: blur(10px);
  }
  
  header.toolbar::-webkit-scrollbar { display: none; }
  header.toolbar { -ms-overflow-style: none; scrollbar-width: none; }
  header.toolbar > * { flex-shrink: 0; }

  .shell-book-title {
    font-family: 'Gowun Batang', serif; font-size: 1.05rem; font-weight: bold;
    color: var(--text-primary); margin: 0 0.5rem; text-align: center;
  }
  
  .toolbar button, .toolbar select, footer.statusbar button {
    background: #FFFFFF; border: 1px solid var(--border-color); color: var(--text-primary);
    border-radius: 25px; padding: 0.45rem 1rem; font-size: 0.85rem; cursor: pointer;
    transition: all 0.25s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
  }
  
  .toolbar button:hover, .toolbar select:hover, footer.statusbar button:hover {
    border-color: var(--accent); color: var(--accent); background: #F4F7F6;
  }
  
  #back-to-library { background: var(--accent); color: white; border: none; }
  #back-to-library:hover { background: var(--accent-hover); color: white; }

  #bgm-toggle.active { background: var(--accent); color: white; border-color: var(--accent); }

  @media (max-width: 650px) {
    #library { padding: 3rem 1.2rem; }
    #library-header h1 { font-size: 1.8rem; }
    .subtitle { font-size: 1rem !important; }
    header.toolbar { padding: 0.5rem 0.8rem; gap: 0.5rem; }
    .toolbar button, .toolbar select { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
    .shell-book-title { font-size: 0.95rem; margin: 0 0.2rem; }
    footer.statusbar { padding: 0.6rem 0.8rem; gap: 0.5rem; }
    footer.statusbar button { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
  }

  #viewer-wrap { flex: 1; position: relative; overflow: hidden; background: #FFFFFF; }
  #viewer { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* 투명 터치/스와이프 패널 */
  .touch-overlay {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 30%;
    z-index: 20;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #touch-overlay-left { left: 0; }
  #touch-overlay-right { right: 0; }

  @keyframes turnNext {
    0% { transform: translateX(30px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  @keyframes turnPrev {
    0% { transform: translateX(-30px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  .turn-next-anim { animation: turnNext 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  .turn-prev-anim { animation: turnPrev 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

  #loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; opacity: .9; font-weight: bold; color: var(--accent); z-index: 5;
    background: rgba(251,249,246,0.95);
  }
  #loading[hidden] { display: none !important; }

  footer.statusbar {
    padding: 1rem 1.5rem; background: var(--toolbar-bg);
    border-top: 1px solid var(--border-color);
    display: flex; align-items: center; gap: 1rem; font-size: 0.85rem;
    backdrop-filter: blur(10px);
  }
  
  #progress-slider {
    flex: 1; cursor: pointer; accent-color: var(--accent);
    height: 4px; border-radius: 2px; outline: none;
  }
  
  #progress-label { min-width: 4ch; text-align: right; color: var(--text-secondary); font-weight: bold; }

</style>
</head>
<body>

  <!-- BGM 오디오 파일 -->
  <audio id="bgm" src="./music/bgm.mp3" preload="auto" loop></audio>

  <div id="library">
    <div id="library-header">
      <p class="subtitle">푸르던 날에 심어둔 씨앗, 다시 하나의 숲으로 만나다</p>
      <h1>숲을 위한 씨앗 해낭문학회</h1>
      <p class="credit">해낭 20회 이재근 재능기부</p>
    </div>
    <div class="bookshelf" id="bookshelf">
    </div>
  </div>

  <div id="reader-shell">
    <header class="toolbar">
      <button id="back-to-library">◀ 서재</button>
      <span class="shell-book-title" id="shell-title">책을 불러오는 중...</span>
      
      <!-- 🌟 버튼 이름 '해낭회가'로 변경 -->
      <button id="font-inc" title="글자 크게">가+</button>
      <button id="bgm-toggle" title="음악 재생/정지">🎵 해낭회가</button>
      <button id="font-dec" title="글자 작게">가−</button>
      <button id="spread-toggle" title="페이지 보기 방식 전환">📖 양면</button>

      <select id="font-family-select" title="글자체 선택">
        <option value="'Gowun Batang', serif" selected>고운바탕 (시집 추천)</option>
        <option value="'Noto Sans KR', sans-serif">본고딕 (깔끔함)</option>
        <option value="'Noto Serif KR', serif">본명조 (단정함)</option>
        <option value="'Gowun Dodum', sans-serif">고운돋움 (정갈함)</option>
        <option value="'Nanum Pen Script', cursive">나눔펜 (감성 손글씨)</option>
      </select>
    </header>

    <div id="viewer-wrap">
      <div id="viewer"></div>
      
      <!-- 투명 터치/스와이프 패널 -->
      <div id="touch-overlay-left" class="touch-overlay"></div>
      <div id="touch-overlay-right" class="touch-overlay"></div>

      <div id="loading" hidden>책을 펼치는 중...</div>
    </div>

    <footer class="statusbar">
      <button id="prev-btn">◀ 이전</button>
      <input type="range" id="progress-slider" min="0" max="100" value="0" step="1" title="위치를 드래그하여 이동하세요" disabled>
      <span id="progress-label">0%</span>
      <button id="next-btn">다음 ▶</button>
    </footer>
  </div>

<script>
(function () {
  var bookList = [
    { title: "해낭 제1집: 해바람", author: "해낭문학회", url: "./books/01.epub", cover: "./images/01.jpg" },
    { title: "해낭 제3집: 분노는 그리 초조하지 않게", author: "해낭문학회", url: "./books/03.epub", cover: "./images/03.jpg" },
    { title: "해낭 제5집: 고추단 아기 쑤욱 나오니", author: "해낭문학회", url: "./books/05.epub", cover: "./images/05.jpg" },
    { title: "해낭 제6집: 역사는 후퇴가 없나니", author: "해낭문학회", url: "./books/06.epub", cover: "./images/06.jpg" },
    { title: "해낭 제13집: 달라진 것은 있어도 사라진 것은...", author: "해낭문학회", url: "./books/13.epub", cover: "./images/13.jpg" },
    { title: "해낭 제14집: 기쁨과 슬픔이 연대하고서", author: "해낭문학회", url: "./books/14.epub", cover: "./images/14.jpg" },
    { title: "해낭 제17집: 어허야라, 황사 바람 불어온다", author: "해낭문학회", url: "./books/17.epub", cover: "./images/17.jpg" },
    { title: "해낭 제22집: 아직은 가을을 말하는 것이 어떠랴", author: "해낭문학회", url: "./books/22.epub", cover: "./images/22.jpg" },
    { title: "해낭 제23집: 알몸으로 틔우는 푸르름", author: "해낭문학회", url: "./books/23.epub", cover: "./images/23.jpg" },
    { title: "해낭 제24집: 밤은 창문을 두드릴 뿐이다", author: "해낭문학회", url: "./books/24.epub", cover: "./images/24.jpg" },
    { title: "해낭 제25집: 깊은 물은 소리를 삼키우고", author: "해낭문학회", url: "./books/25.epub", cover: "./images/25.jpg" },
    { title: "해낭 제27집: 다시, 길 위에 신새벽의 시선들이", author: "해낭문학회", url: "./books/27.epub", cover: "./images/27.jpg" },
    { title: "해낭 제28집: 가을, 하늘의 파랑보다 더 진한", author: "해낭문학회", url: "./books/28.epub", cover: "./images/28.jpg" },
    { title: "해낭 제29집: 진원을 알 수 없는 삶의 울림", author: "해낭문학회", url: "./books/29.epub", cover: "./images/29.jpg" },
    { title: "해낭 제30집: 가을, 버릴 것 없이 가진 것 없이", author: "해낭문학회", url: "./books/30.epub", cover: "./images/30.jpg" },
    { title: "해낭 제31집: 삶은 기다림이 아니다", author: "해낭문학회", url: "./books/31.epub", cover: "./images/31.jpg" },
    { title: "해낭 제32집: 내림표 가득한 세상에서", author: "해낭문학회", url: "./books/32.epub", cover: "./images/32.jpg" }
  ];

  var book = null, rendition = null;
  var fontSize = 120; 
  var currentFont = "'Gowun Batang', serif"; 
  var currentSpread = "none";
  
  var shell = document.getElementById('reader-shell');
  var loadingEl = document.getElementById('loading');
  var bookshelfEl = document.getElementById('bookshelf');
  var progressSlider = document.getElementById('progress-slider');
  var viewerEl = document.getElementById('viewer');

  var bgm = document.getElementById('bgm');
  var bgmToggle = document.getElementById('bgm-toggle');
  var isPlaying = false;

  bgmToggle.addEventListener('click', function() {
    if (isPlaying) {
      bgm.pause();
      bgmToggle.textContent = '🎵 해낭회가'; // 🌟 끄면 다시 원래 텍스트로
      bgmToggle.classList.remove('active');
    } else {
      bgm.play().catch(function(e) { 
        alert("음악 파일(bgm.mp3) 재생에 실패했습니다. 깃허브 캐시가 아직 갱신되지 않았을 수 있으니 나중에 다시 시도해 주세요."); 
      });
      bgmToggle.textContent = '🔇 해낭회가 끄기'; // 🌟 켜져있을 때 표시되는 텍스트
      bgmToggle.classList.add('active');
    }
    isPlaying = !isPlaying;
  });

  bookList.forEach(function(item) {
    var card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <img src="${item.cover}" alt="${item.title} 표지" class="book-cover" onerror="this.src='https://via.placeholder.com/150x225?text=No+Cover'">
      <p class="book-title">${item.title}</p>
      <p class="book-author">${item.author}</p>
    `;
    card.addEventListener('click', function() {
      openBook(item.url, item.title);
    });
    bookshelfEl.appendChild(card);
  });

  function animatePageTurn(direction) {
    viewerEl.classList.remove('turn-next-anim', 'turn-prev-anim');
    void viewerEl.offsetWidth; 
    if (direction === 'next') {
      viewerEl.classList.add('turn-next-anim');
    } else {
      viewerEl.classList.add('turn-prev-anim');
    }
  }

  function goPrev() { if(rendition) { rendition.prev(); animatePageTurn('prev'); } }
  function goNext() { if(rendition) { rendition.next(); animatePageTurn('next'); } }

  function openBook(url, titleStr) {
    if(book) { book.destroy(); }
    viewerEl.innerHTML = '';
    progressSlider.value = 0;
    progressSlider.disabled = true; 
    document.getElementById('progress-label').textContent = '0%';
    document.getElementById('shell-title').textContent = titleStr;
    
    loadingEl.hidden = false;
    shell.classList.add('visible');

    book = ePub(url);
    
    rendition = book.renderTo("viewer", { 
      width: "100%", 
      height: "100%", 
      spread: currentSpread 
    });
    
    rendition.hooks.content.register(function(contents) {
      contents.addStylesheet("https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500&family=Nanum+Pen+Script&display=swap");
      
      var doc = contents.document;
      var startX = 0, startY = 0, startTime = 0;
      
      doc.addEventListener('touchstart', function(e){
        startX = e.touches[0].screenX;
        startY = e.touches[0].screenY;
        startTime = Date.now();
      }, { passive: true });
      
      doc.addEventListener('touchend', function(e){
        if (e.changedTouches.length === 0) return;
        var diffX = e.changedTouches[0].screenX - startX;
        var diffY = e.changedTouches[0].screenY - startY;
        var timeDiff = Date.now() - startTime;
        if (Math.abs(diffX) > 40 && Math.abs(diffX) > Math.abs(diffY) && timeDiff < 800) {
          diffX > 0 ? goPrev() : goNext();
        }
      }, { passive: true });
    });

    rendition.themes.fontSize(fontSize + "%");
    rendition.themes.font(currentFont);

    book.ready.then(function() {
      return book.locations.generate(1600);
    }).then(function(locations) {
      progressSlider.disabled = false;
    });

    rendition.display().then(function () {
      loadingEl.hidden = true;
    }).catch(function(err) {
      alert("책을 불러오는데 실패했습니다.");
      loadingEl.hidden = true;
    });

    rendition.on("relocated", function (location) {
      var pct = Math.round(((location.start && location.start.percentage) || 0) * 100);
      progressSlider.value = pct;
      document.getElementById('progress-label').textContent = pct + "%";
    });
  }

  progressSlider.addEventListener('change', function(e) {
    var percentage = e.target.value / 100;
    if (book && book.locations.length() > 0) {
      var cfi = book.locations.cfiFromPercentage(percentage);
      rendition.display(cfi);
    }
  });

  document.getElementById('back-to-library').addEventListener('click', function () {
    shell.classList.remove('visible');
  });

  document.getElementById('font-family-select').addEventListener('change', function(e) {
    currentFont = e.target.value;
    if(rendition) rendition.themes.font(currentFont);
  });

  document.getElementById('spread-toggle').addEventListener('click', function() {
    if (currentSpread === "none") {
      currentSpread = "auto";
      this.textContent = "📄 단면";
    } else {
      currentSpread = "none";
      this.textContent = "📖 양면";
    }
    if(rendition) rendition.spread(currentSpread);
  });

  document.getElementById('prev-btn').addEventListener('click', goPrev);
  document.getElementById('next-btn').addEventListener('click', goNext);

  document.addEventListener('keydown', function (e) {
    if (!shell.classList.contains('visible')) return;
    if (e.key === "ArrowLeft") goPrev();
    if (e.key === "ArrowRight") goNext();
  });

  document.getElementById('font-inc').addEventListener('click', function () {
    fontSize = Math.min(180, fontSize + 10);
    if(rendition) rendition.themes.fontSize(fontSize + "%");
  });
  document.getElementById('font-dec').addEventListener('click', function () {
    fontSize = Math.max(70, fontSize - 10);
    if(rendition) rendition.themes.fontSize(fontSize + "%");
  });

  // 투명 터치 패널 이벤트 (모바일 및 PC)
  var overlays = document.querySelectorAll('.touch-overlay');
  overlays.forEach(function(panel) {
    var startX = 0, startY = 0, startTime = 0;

    panel.addEventListener('touchstart', function (e) {
      startX = e.changedTouches[0].screenX;
      startY = e.changedTouches[0].screenY;
      startTime = Date.now();
    }, { passive: true });
    
    panel.addEventListener('touchend', function (e) {
      var diffX = e.changedTouches[0].screenX - startX;
      var diffY = e.changedTouches[0].screenY - startY;
      var timeDiff = Date.now() - startTime;
      
      if (Math.abs(diffX) > 40 && Math.abs(diffX) > Math.abs(diffY) && timeDiff < 800) {
        diffX > 0 ? goPrev() : goNext();
        if(e.cancelable) e.preventDefault();
      } 
      else if (Math.abs(diffX) < 15 && Math.abs(diffY) < 15 && timeDiff < 400) {
        panel.id === 'touch-overlay-left' ? goPrev() : goNext();
        if(e.cancelable) e.preventDefault();
      }
    }, { passive: false });

    panel.addEventListener('click', function(e) {
      panel.id === 'touch-overlay-left' ? goPrev() : goNext();
    });
  });

  window.addEventListener('resize', function () {
    if (shell.classList.contains('visible') && rendition) rendition.resize();
  });
})();
</script>
</body>
</html>

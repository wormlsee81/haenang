<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>숲을 위한 씨앗 해낭문학회</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

<!-- ePub.js 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

<style>
  :root {
    --paper: #F8F9FA;
    --ink: #2B2622;
    --accent: #3E6B5C;
    --rule: #E9ECEF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Gowun Dodum', sans-serif;
  }

  button, select { font-family: inherit; }

  /* ---------- 서재 (책장) UI ---------- */
  #library {
    padding: 3rem 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  
  #library h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 2rem;
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1rem;
  }

  .bookshelf {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 2rem 1.5rem;
  }

  .book-card {
    cursor: pointer;
    text-align: left;
    transition: transform 0.2s ease;
  }

  .book-card:hover {
    transform: translateY(-5px);
  }

  .book-cover {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
    margin-bottom: 0.8rem;
    background-color: #ddd;
    border-radius: 2px;
  }

  .book-title {
    font-weight: 700;
    font-size: 0.95rem;
    margin: 0 0 0.3rem 0;
    line-height: 1.3;
    word-break: keep-all;
  }

  .book-author {
    font-size: 0.8rem;
    color: #666;
    margin: 0;
  }

  /* ---------- Reader shell (책 읽기 화면) ---------- */
  #reader-shell {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    background: #EDE7D9;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 100;
  }
  #reader-shell.visible { transform: translateY(0); }

  /* 🌟 스마트폰 대응 반응형 툴바 CSS */
  header.toolbar {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
    padding: 0.6rem 0.9rem; border-bottom: 1px solid #CBBFA0; gap: 0.5rem;
  }
  .toolbar-group {
    display: flex; gap: 0.35rem; align-items: center;
  }
  .shell-book-title {
    font-family: 'Gowun Batang', serif; font-size: 0.95rem; font-weight: bold;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: center;
    min-width: 100px;
  }
  
  .toolbar button, .toolbar select, footer.statusbar button {
    background: none; border: 1px solid #CBBFA0; color: var(--ink);
    border-radius: 2px; padding: 0.35rem 0.5rem; font-size: 0.75rem; cursor: pointer;
  }
  .toolbar select { max-width: 120px; text-overflow: ellipsis; }
  
  #back-to-library { font-weight: bold; color: var(--accent); border-color: var(--accent); }

  /* 화면 폭이 좁은 모바일 기기일 때 레이아웃 세로 정렬 */
  @media (max-width: 650px) {
    header.toolbar { flex-direction: column; align-items: stretch; padding: 0.5rem; }
    .shell-book-title { order: -1; margin-bottom: 0.4rem; font-size: 0.9rem; }
    .toolbar-group { justify-content: space-between; width: 100%; }
    .toolbar-group.right { justify-content: flex-end; flex-wrap: wrap; }
  }

  #viewer-wrap { flex: 1; position: relative; overflow: hidden; }
  #viewer { position: absolute; inset: 0; }

  .nav-zone { position: absolute; top: 0; bottom: 0; width: 14%; cursor: pointer; z-index: 2; }
  .nav-zone.left { left: 0; } .nav-zone.right { right: 0; }

  #loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; opacity: .8; font-weight: bold; z-index: 5;
  }
  #loading[hidden] { display: none !important; }

  footer.statusbar {
    padding: .5rem .9rem; border-top: 1px solid #CBBFA0;
    display: flex; align-items: center; gap: .75rem; font-size: .75rem;
  }
  .progress-track { flex: 1; height: 3px; background: #CBBFA0; border-radius: 2px; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width .3s ease; }
  #progress-label { min-width: 4ch; text-align: right; opacity: .7; }

</style>
</head>
<body>

  <!-- 메인 서재 화면 -->
  <div id="library">
    <h1>숲을 위한 씨앗 해낭문학회</h1>
    <div class="bookshelf" id="bookshelf">
      <!-- 자바스크립트로 자동 생성 -->
    </div>
  </div>

  <!-- 책 읽기 뷰어 화면 -->
  <div id="reader-shell">
    <header class="toolbar">
      <div class="toolbar-group">
        <button id="back-to-library">◀ 서재로</button>
      </div>
      
      <span class="shell-book-title" id="shell-title">책을 불러오는 중...</span>
      
      <div class="toolbar-group right">
        <!-- 기기 설치 폰트 선택 메뉴 -->
        <select id="font-family-select" title="글자체 선택">
          <option value="sans-serif">기본 고딕 (모바일/PC)</option>
          <option value="serif">기본 명조 (모바일/PC)</option>
          <option value="'Malgun Gothic', sans-serif">맑은 고딕 (윈도우)</option>
          <option value="'Apple SD Gothic Neo', sans-serif">애플 고딕 (맥/아이폰)</option>
          <option value="'Batang', serif">바탕체 (윈도우)</option>
          <option value="'Dotum', sans-serif">돋움체 (윈도우)</option>
        </select>
        
        <!-- 단면/양면 전환 버튼 -->
        <button id="spread-toggle" title="페이지 보기 방식 전환">📖 양면</button>
        <button id="font-dec" title="글자 작게">가−</button>
        <button id="font-inc" title="글자 크게">가+</button>
      </div>
    </header>

    <div id="viewer-wrap">
      <div id="viewer"></div>
      <div id="loading" hidden>책을 펼치는 중...</div>
      <div class="nav-zone left" id="zone-prev"></div>
      <div class="nav-zone right" id="zone-next"></div>
    </div>

    <footer class="statusbar">
      <button id="prev-btn">◀ 이전</button>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span id="progress-label">0%</span>
      <button id="next-btn">다음 ▶</button>
    </footer>
  </div>

<script>
(function () {
  var bookList = [
    { title: "해낭시 제1집: 해바람", author: "해낭문학회", url: "./books/01.epub" },
    { title: "해낭시 제3집: 분노는 그리 초조하지 않게", author: "해낭문학회", url: "./books/03.epub" },
    { title: "해낭시 제6집: 역사는 후퇴가 없나니", author: "해낭문학회", url: "./books/06.epub" },
    { title: "해낭시 제13집: 달라진 것은 있어도 사라진 것은...", author: "해낭문학회", url: "./books/13.epub" },
    { title: "해낭시 제14집: 기쁨과 슬픔이 연대하고서", author: "해낭문학회", url: "./books/14.epub" },
    { title: "해낭시 제17집: 어허야라 황사바람 불어온다", author: "해낭문학회", url: "./books/17.epub" }
  ];

  var book = null, rendition = null;
  var fontSize = 100;
  var currentFont = "sans-serif"; // 초기 폰트
  var currentSpread = "none";     // 초기 단면 모드 ("none" = 1페이지, "auto" = 2페이지)
  
  var shell = document.getElementById('reader-shell');
  var loadingEl = document.getElementById('loading');
  var bookshelfEl = document.getElementById('bookshelf');

  // 1. 책장 UI 생성 및 표지 자동 추출
  bookList.forEach(function(item, index) {
    var card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <img src="https://via.placeholder.com/150x225?text=Loading..." alt="${item.title} 표지" class="book-cover" id="cover-${index}">
      <p class="book-title">${item.title}</p>
      <p class="book-author">${item.author}</p>
    `;
    
    card.addEventListener('click', function() {
      openBook(item.url, item.title);
    });
    bookshelfEl.appendChild(card);

    var tempBook = ePub(item.url);
    tempBook.loaded.cover.then(function(coverPath) {
      if(coverPath) return tempBook.archive.createUrl(coverPath);
      else throw new Error("표지 없음");
    }).then(function(blobUrl) {
      document.getElementById('cover-' + index).src = blobUrl;
    }).catch(function() {
      document.getElementById('cover-' + index).src = 'https://via.placeholder.com/150x225?text=No+Cover';
    });
  });

  // 2. 책 뷰어 렌더링 함수
  function openBook(url, titleStr) {
    if(book) { book.destroy(); }
    document.getElementById('viewer').innerHTML = '';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-label').textContent = '0%';
    document.getElementById('shell-title').textContent = titleStr;
    
    loadingEl.hidden = false;
    shell.classList.add('visible');

    book = ePub(url);
    
    // 렌더링 시 현재 설정된 단면/양면(spread) 적용
    rendition = book.renderTo("viewer", { 
      width: "100%", 
      height: "100%", 
      spread: currentSpread 
    });
    
    // 렌더링 시 현재 설정된 폰트 크기 및 글자체 적용
    rendition.themes.fontSize(fontSize + "%");
    rendition.themes.font(currentFont);

    rendition.display().then(function () {
      loadingEl.hidden = true;
    }).catch(function(err) {
      alert("책을 불러오는데 실패했습니다. 파일 경로를 확인해주세요.");
      loadingEl.hidden = true;
    });

    rendition.on("relocated", function (location) {
      var pct = Math.round(((location.start && location.start.percentage) || 0) * 100);
      document.getElementById('progress-fill').style.width = pct + "%";
      document.getElementById('progress-label').textContent = pct + "%";
    });
  }

  // ============== 뷰어 툴바 버튼 이벤트 ==============
  
  // 뒤로 가기
  document.getElementById('back-to-library').addEventListener('click', function () {
    shell.classList.remove('visible');
  });

  // 폰트 변경 이벤트
  document.getElementById('font-family-select').addEventListener('change', function(e) {
    currentFont = e.target.value;
    if(rendition) {
      rendition.themes.font(currentFont);
    }
  });

  // 단면/양면 전환 이벤트
  document.getElementById('spread-toggle').addEventListener('click', function() {
    if (currentSpread === "none") {
      currentSpread = "auto";
      this.textContent = "📄 단면"; // 양면일 때 누르면 단면으로 돌아가도록 텍스트 변경
    } else {
      currentSpread = "none";
      this.textContent = "📖 양면";
    }
    
    if(rendition) {
      rendition.spread(currentSpread);
    }
  });

  // 페이지 이동
  function goPrev() { if(rendition) rendition.prev(); }
  function goNext() { if(rendition) rendition.next(); }

  document.getElementById('prev-btn').addEventListener('click', goPrev);
  document.getElementById('next-btn').addEventListener('click', goNext);
  document.getElementById('zone-prev').addEventListener('click', goPrev);
  document.getElementById('zone-next').addEventListener('click', goNext);

  document.addEventListener('keydown', function (e) {
    if (!shell.classList.contains('visible')) return;
    if (e.key === "ArrowLeft") goPrev();
    if (e.key === "ArrowRight") goNext();
  });

  var touchStartX = null;
  var viewerWrap = document.getElementById('viewer-wrap');
  viewerWrap.addEventListener('touchstart', function (e) {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });
  viewerWrap.addEventListener('touchend', function (e) {
    if (touchStartX === null || !rendition) return;
    var dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 50) { dx > 0 ? goPrev() : goNext(); }
    touchStartX = null;
  }, { passive: true });

  // 글자 크기
  document.getElementById('font-inc').addEventListener('click', function () {
    fontSize = Math.min(180, fontSize + 10);
    if(rendition) rendition.themes.fontSize(fontSize + "%");
  });
  document.getElementById('font-dec').addEventListener('click', function () {
    fontSize = Math.max(70, fontSize - 10);
    if(rendition) rendition.themes.fontSize(fontSize + "%");
  });

  // 화면 리사이즈
  window.addEventListener('resize', function () {
    if (shell.classList.contains('visible') && rendition) rendition.resize();
  });
})();
</script>
</body>
</html>

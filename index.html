<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>책 제목</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

<style>
  :root {
    --paper: #EDE7D9;
    --ink: #2B2622;
    --accent: #3E6B5C;
    --accent-deep: #2A4A40;
    --rule: #CBBFA0;
  }
  html[data-theme="dark"] {
    --paper: #1B1F1D;
    --ink: #E4DCC8;
    --accent: #6FA893;
    --accent-deep: #9CC7B7;
    --rule: #3A423E;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Gowun Dodum', sans-serif;
    transition: background .4s ease, color .4s ease;
    overscroll-behavior: none;
  }

  button { font-family: inherit; }

  /* ---------- Cover ---------- */
  #cover {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
    background: var(--paper);
    transition: transform .7s cubic-bezier(.6,0,.3,1), opacity .6s ease;
  }
  #cover.opened { transform: translateY(-100%); opacity: 0; pointer-events: none; }
  #cover .eyebrow {
    font-size: .8rem; letter-spacing: .15em; opacity: .55; margin-bottom: 1.1rem;
  }
  #cover h1 {
    font-family: 'Gowun Batang', serif; font-weight: 700;
    font-size: clamp(1.7rem, 6vw, 3rem);
    margin: 0 0 .6rem; line-height: 1.3; max-width: 20ch;
  }
  #cover .author { font-size: .95rem; opacity: .65; margin: 0 0 2.6rem; }
  #open-book {
    background: var(--accent); color: var(--paper); border: none;
    padding: .85rem 2.3rem; border-radius: 2px;
    font-size: 1rem; letter-spacing: .04em; cursor: pointer;
    transition: background .2s ease, transform .15s ease;
  }
  #open-book:hover { background: var(--accent-deep); }
  #open-book:active { transform: scale(.97); }
  #open-book:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  /* ---------- Reader shell ---------- */
  #reader-shell {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    opacity: 0; transition: opacity .5s ease .15s;
  }
  #reader-shell.visible { opacity: 1; }

  header.toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: .6rem .9rem; border-bottom: 1px solid var(--rule);
    gap: .5rem;
  }
  header.toolbar .book-title {
    font-family: 'Gowun Batang', serif; font-size: .92rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; text-align: center;
  }
  .btn-group { display: flex; gap: .35rem; }
  .toolbar button, footer.statusbar button {
    background: none; border: 1px solid var(--rule); color: var(--ink);
    border-radius: 2px; padding: .35rem .55rem; font-size: .78rem; cursor: pointer;
    transition: border-color .15s ease, color .15s ease;
  }
  .toolbar button:hover, footer.statusbar button:hover { border-color: var(--accent); color: var(--accent); }
  .toolbar button:focus-visible, footer.statusbar button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  #viewer-wrap { flex: 1; position: relative; overflow: hidden; }
  #viewer { position: absolute; inset: 0; }

  .nav-zone { position: absolute; top: 0; bottom: 0; width: 14%; cursor: pointer; z-index: 2; }
  .nav-zone.left { left: 0; } .nav-zone.right { right: 0; }

  #loading, #error {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: .9rem; opacity: .7; text-align: center; padding: 2rem; line-height: 1.6;
  }

  footer.statusbar {
    padding: .5rem .9rem; border-top: 1px solid var(--rule);
    display: flex; align-items: center; gap: .75rem; font-size: .75rem;
  }
  .progress-track { flex: 1; height: 3px; background: var(--rule); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width .3s ease; }
  #progress-label { min-width: 3ch; text-align: right; opacity: .7; }

  /* ---------- TOC panel ---------- */
  #toc-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(300px, 82vw);
    background: var(--paper); border-left: 1px solid var(--rule);
    transform: translateX(100%); transition: transform .3s ease;
    z-index: 20; overflow-y: auto; padding: 1.2rem;
  }
  #toc-panel.open { transform: translateX(0); }
  #toc-panel h2 { font-family: 'Gowun Batang', serif; font-size: 1rem; margin-top: 0; }
  #toc-panel ul { list-style: none; padding: 0; margin: 0; }
  #toc-panel li button {
    display: block; width: 100%; text-align: left; background: none; border: none;
    padding: .6rem 0; border-bottom: 1px solid var(--rule); color: var(--ink); cursor: pointer; font-size: .88rem;
  }
  #toc-panel li button:hover { color: var(--accent); }
  #toc-close {
    background: none; border: 1px solid var(--rule); border-radius: 2px;
    padding: .3rem .6rem; margin-bottom: .8rem; cursor: pointer; color: var(--ink);
  }

  @media (prefers-reduced-motion: reduce) {
    #cover, #reader-shell, #toc-panel, .progress-fill { transition: none !important; }
  }
</style>
</head>
<body>

  <div id="cover">
    <p class="eyebrow" id="cover-eyebrow">개인 창작물 · 전자책</p>
    <h1 id="cover-title">책 제목</h1>
    <p class="author" id="cover-author"></p>
    <button id="open-book">표지 넘기기</button>
  </div>

  <div id="reader-shell">
    <header class="toolbar">
      <div class="btn-group">
        <button id="toc-btn" aria-label="목차 열기">목차</button>
      </div>
      <span class="book-title" id="shell-title"></span>
      <div class="btn-group">
        <button id="font-dec" aria-label="글자 작게">가−</button>
        <button id="font-inc" aria-label="글자 크게">가+</button>
        <button id="theme-toggle" aria-label="화면 모드 전환">모드</button>
      </div>
    </header>

    <div id="viewer-wrap">
      <div id="viewer"></div>
      <div id="loading">책을 펼치는 중...</div>
      <div id="error" hidden>book.epub 파일을 불러올 수 없어요.<br>index.html과 같은 폴더에 book.epub이 있는지 확인해 주세요.</div>
      <div class="nav-zone left" id="zone-prev" aria-hidden="true"></div>
      <div class="nav-zone right" id="zone-next" aria-hidden="true"></div>
    </div>

    <footer class="statusbar">
      <button id="prev-btn" aria-label="이전 페이지">◀ 이전</button>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span id="progress-label">0%</span>
      <button id="next-btn" aria-label="다음 페이지">다음 ▶</button>
    </footer>
  </div>

  <nav id="toc-panel" aria-label="목차">
    <button id="toc-close" aria-label="목차 닫기">닫기 ✕</button>
    <h2>목차</h2>
    <ul id="toc-list"></ul>
  </nav>

<script>
(function () {
  var BOOK_URL = "./book.epub";
  var fontSize = 100;

  var cover = document.getElementById('cover');
  var shell = document.getElementById('reader-shell');
  var loadingEl = document.getElementById('loading');
  var errorEl = document.getElementById('error');
  var tocPanel = document.getElementById('toc-panel');

  var book = ePub(BOOK_URL);
  var rendition = book.renderTo("viewer", {
    width: "100%",
    height: "100%",
    spread: "none"
  });

  rendition.themes.register("light", { body: { background: "transparent", color: "#2B2622" } });
  rendition.themes.register("dark", { body: { background: "transparent", color: "#E4DCC8" } });
  rendition.themes.select(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
  rendition.themes.fontSize(fontSize + "%");

  book.loaded.metadata.then(function (meta) {
    var title = (meta && meta.title) ? meta.title : "책 제목";
    var author = (meta && meta.creator) ? meta.creator : "";
    document.getElementById('cover-title').textContent = title;
    document.getElementById('cover-author').textContent = author;
    document.getElementById('shell-title').textContent = title;
    document.title = title;
  }).catch(function () {});

  book.loaded.navigation.then(function (nav) {
    var list = document.getElementById('toc-list');
    (nav.toc || []).forEach(function (item) {
      var li = document.createElement('li');
      var btn = document.createElement('button');
      btn.textContent = item.label ? item.label.trim() : item.href;
      btn.addEventListener('click', function () {
        rendition.display(item.href);
        tocPanel.classList.remove('open');
      });
      li.appendChild(btn);
      list.appendChild(li);
    });
  }).catch(function () {});

  rendition.display().then(function () {
    loadingEl.hidden = true;
  }).catch(function () {
    loadingEl.hidden = true;
    errorEl.hidden = false;
  });

  rendition.on("relocated", function (location) {
    var pct = Math.round(((location.start && location.start.percentage) || 0) * 100);
    document.getElementById('progress-fill').style.width = pct + "%";
    document.getElementById('progress-label').textContent = pct + "%";
  });

  document.getElementById('open-book').addEventListener('click', function () {
    cover.classList.add('opened');
    shell.classList.add('visible');
    setTimeout(function () { rendition.resize(); }, 60);
  });

  document.getElementById('prev-btn').addEventListener('click', function () { rendition.prev(); });
  document.getElementById('next-btn').addEventListener('click', function () { rendition.next(); });
  document.getElementById('zone-prev').addEventListener('click', function () { rendition.prev(); });
  document.getElementById('zone-next').addEventListener('click', function () { rendition.next(); });

  document.addEventListener('keydown', function (e) {
    if (!shell.classList.contains('visible')) return;
    if (e.key === "ArrowLeft") rendition.prev();
    if (e.key === "ArrowRight") rendition.next();
    if (e.key === "Escape") tocPanel.classList.remove('open');
  });

  var touchStartX = null;
  var viewerWrap = document.getElementById('viewer-wrap');
  viewerWrap.addEventListener('touchstart', function (e) {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });
  viewerWrap.addEventListener('touchend', function (e) {
    if (touchStartX === null) return;
    var dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 50) { dx > 0 ? rendition.prev() : rendition.next(); }
    touchStartX = null;
  }, { passive: true });

  document.getElementById('font-inc').addEventListener('click', function () {
    fontSize = Math.min(180, fontSize + 10);
    rendition.themes.fontSize(fontSize + "%");
  });
  document.getElementById('font-dec').addEventListener('click', function () {
    fontSize = Math.max(70, fontSize - 10);
    rendition.themes.fontSize(fontSize + "%");
  });

  document.getElementById('theme-toggle').addEventListener('click', function () {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    rendition.themes.select(isDark ? 'light' : 'dark');
  });

  document.getElementById('toc-btn').addEventListener('click', function () {
    tocPanel.classList.toggle('open');
  });
  document.getElementById('toc-close').addEventListener('click', function () {
    tocPanel.classList.remove('open');
  });

  window.addEventListener('resize', function () {
    if (shell.classList.contains('visible')) rendition.resize();
  });
})();
</script>
</body>
</html>

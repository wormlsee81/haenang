<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>나만의 온라인 서재</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

<!-- ePub.js 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

<style>
  :root {
    --paper: #F8F9FA;
    --ink: #2B2622;
    --accent: #3E6B5C;
    --rule: #E9ECEF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Gowun Dodum', sans-serif;
  }

  button { font-family: inherit; }

  /* ---------- 서재 (책장) UI ---------- */
  #library {
    padding: 3rem 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  
  #library h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 2rem;
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1rem;
  }

  .bookshelf {
    display: grid;
    /* 화면 크기에 맞춰 자동으로 열 개수가 조절됨 (최소 너비 150px) */
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 2rem 1.5rem;
  }

  .book-card {
    cursor: pointer;
    text-align: left;
    transition: transform 0.2s ease;
  }

  .book-card:hover {
    transform: translateY(-5px);
  }

  .book-cover {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
    margin-bottom: 0.8rem;
    background-color: #ddd;
    border-radius: 2px;
  }

  .book-title {
    font-weight: 700;
    font-size: 0.95rem;
    margin: 0 0 0.3rem 0;
    line-height: 1.3;
    word-break: keep-all;
  }

  .book-author {
    font-size: 0.8rem;
    color: #666;
    margin: 0;
  }

  /* ---------- Reader shell (책 읽기 화면) ---------- */
  #reader-shell {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    background: #EDE7D9;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 100;
  }
  #reader-shell.visible { transform: translateY(0); }

  header.toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: .6rem .9rem; border-bottom: 1px solid #CBBFA0; gap: .5rem;
  }
  header.toolbar .shell-book-title {
    font-family: 'Gowun Batang', serif; font-size: .92rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: center;
  }
  .btn-group { display: flex; gap: .35rem; }
  .toolbar button, footer.statusbar button {
    background: none; border: 1px solid #CBBFA0; color: var(--ink);
    border-radius: 2px; padding: .35rem .55rem; font-size: .78rem; cursor: pointer;
  }
  #back-to-library { font-weight: bold; color: var(--accent); border-color: var(--accent); }

  #viewer-wrap { flex: 1; position: relative; overflow: hidden; }
  #viewer { position: absolute; inset: 0; }

  .nav-zone { position: absolute; top: 0; bottom: 0; width: 14%; cursor: pointer; z-index: 2; }
  .nav-zone.left { left: 0; } .nav-zone.right { right: 0; }

  #loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; opacity: .8; font-weight: bold; z-index: 5;
  }

  footer.statusbar {
    padding: .5rem .9rem; border-top: 1px solid #CBBFA0;
    display: flex; align-items: center; gap: .75rem; font-size: .75rem;
  }
  .progress-track { flex: 1; height: 3px; background: #CBBFA0; border-radius: 2px; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width .3s ease; }
  #progress-label { min-width: 4ch; text-align: right; opacity: .7; }

</style>
</head>
<body>

  <!-- 메인 서재 화면 -->
  <div id="library">
    <h1>나만의 서재</h1>
    <div class="bookshelf" id="bookshelf">
      <!-- 자바스크립트를 통해 이곳에 책 목록이 자동으로 생성됨 -->
    </div>
  </div>

  <!-- 책 읽기 뷰어 화면 -->
  <div id="reader-shell">
    <header class="toolbar">
      <div class="btn-group">
        <button id="back-to-library">◀ 서재로</button>
      </div>
      <span class="shell-book-title" id="shell-title">책을 불러오는 중...</span>
      <div class="btn-group">
        <button id="font-dec">가−</button>
        <button id="font-inc">가+</button>
      </div>
    </header>

    <div id="viewer-wrap">
      <div id="viewer"></div>
      <div id="loading" hidden>책을 펼치는 중...</div>
      <div class="nav-zone left" id="zone-prev"></div>
      <div class="nav-zone right" id="zone-next"></div>
    </div>

    <footer class="statusbar">
      <button id="prev-btn">◀ 이전</button>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span id="progress-label">0%</span>
      <button id="next-btn">다음 ▶</button>
    </footer>
  </div>

<script>
(function () {
  // 📚 가지고 있는 30여 개의 책 정보를 이곳에 나열해 주면 돼!
  // 파일 이름에 띄어쓰기가 있다면 있는 그대로 정확하게 적어줘야 해.
  var bookList = [
    { 
      title: "해낭시 제1집: 해바람", 
      author: "해낭문학회", 
      url: "./books/해낭시_제1집_해바람 (1).epub" 
    },
    { 
      title: "해낭시 제3집: 분노는 그리 초조하지 않게", 
      author: "해낭문학회", 
      url: "./books/해낭시_제3집_분노는_그리_초조하지_않게.epub" 
    }
    // ... 나머지 책들도 쉼표(,)로 구분해서 같은 형식으로 아래에 쭉 추가하면 돼!
  ];

  var book = null, rendition = null;
  var fontSize = 100;
  var shell = document.getElementById('reader-shell');
  var loadingEl = document.getElementById('loading');
  var bookshelfEl = document.getElementById('bookshelf');

  // 1. 책장(Grid) UI 생성 및 ePub 표지 자동 추출하기
  bookList.forEach(function(item, index) {
    var card = document.createElement('div');
    card.className = 'book-card';
    
    // 처음엔 임시 로딩 이미지를 보여주도록 뼈대 생성
    card.innerHTML = `
      <img src="https://via.placeholder.com/150x225?text=Loading..." alt="${item.title} 표지" class="book-cover" id="cover-${index}">
      <p class="book-title">${item.title}</p>
      <p class="book-author">${item.author}</p>
    `;
    
    card.addEventListener('click', function() {
      openBook(item.url, item.title);
    });

    bookshelfEl.appendChild(card);

    // ePub 파일 안에서 표지(Cover) 이미지만 백그라운드에서 추출하기
    var tempBook = ePub(item.url);
    tempBook.loaded.cover.then(function(coverPath) {
      if(coverPath) {
        return tempBook.archive.createUrl(coverPath);
      } else {
        throw new Error("표지 없음");
      }
    }).then(function(blobUrl) {
      // 추출 성공 시, 임시 로딩 이미지를 진짜 표지 이미지로 교체
      document.getElementById('cover-' + index).src = blobUrl;
    }).catch(function(err) {
      // 표지가 없거나 불러오기 실패 시 대체 이미지
      document.getElementById('cover-' + index).src = 'https://via.placeholder.com/150x225?text=No+Cover';
    });
  });

  // 2. ePub 책 뷰어 렌더링 함수
  function openBook(url, titleStr) {
    if(book) { book.destroy(); }
    document.getElementById('viewer').innerHTML = '';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-label').textContent = '0%';
    document.getElementById('shell-title').textContent = titleStr;
    
    loadingEl.hidden = false;
    shell.classList.add('visible'); // 뷰어 화면을 위로 슬라이드

    book = ePub(url);
    rendition = book.renderTo("viewer", { width: "100%", height: "100%", spread: "none" });
    
    rendition.themes.fontSize(fontSize + "%");

    rendition.display().then(function () {
      loadingEl.hidden = true;
    }).catch(function(err) {
      alert("책을 불러오는데 실패했습니다. 파일 경로를 확인해주세요.");
      loadingEl.hidden = true;
    });

    rendition.on("relocated", function (location) {
      var pct = Math.round(((location.start && location.start.percentage) || 0) * 100);
      document.getElementById('progress-fill').style.width = pct + "%";
      document.getElementById('progress-label').textContent = pct + "%";
    });
  }

  // ============== 뷰어 버튼 및 조작 이벤트 ==============
  
  // 뒤로 가기 (서재로 닫기)
  document.getElementById('back-to-library').addEventListener('click', function () {
    shell.classList.remove('visible');
  });

  // 페이지 이동 로직
  function goPrev() { if(rendition) rendition.prev(); }
  function goNext() { if(rendition) rendition.next(); }

  document.getElementById('prev-btn').addEventListener('click', goPrev);
  document.getElementById('next-btn').addEventListener('click', goNext);
  document.getElementById('zone-prev').addEventListener('click', goPrev);
  document.getElementById('zone-next').addEventListener('click', goNext);

  // 키보드 방향키 이동 지원
  document.addEventListener('keydown', function (e) {
    if (!shell.classList.contains('visible')) return;
    if (e.key === "ArrowLeft") goPrev();
    if (e.key === "ArrowRight") goNext();
  });

  // 터치 스와이프 이동 지원
  var touchStartX = null;
  var viewerWrap = document.getElementById('viewer-wrap');
  viewerWrap.addEventListener('touchstart', function (e) {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });
  viewerWrap.addEventListener('touchend', function (e) {
    if (touchStartX === null || !rendition) return;
    var dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 50) { dx > 0 ? goPrev() : goNext(); }
    touchStartX = null;
  }, { passive: true });

  // 글자 크기 조절
  document.getElementById('font-inc').addEventListener('click', function () {
    fontSize = Math.min(180, fontSize + 10);
    if(rendition) rendition.themes.fontSize(fontSize + "%");
  });
  document.getElementById('font-dec').addEventListener('click', function () {
    fontSize = Math.max(70, fontSize - 10);
    if(rendition) rendition.themes.fontSize(fontSize + "%");
  });

  // 브라우저 창 크기 조절 대응
  window.addEventListener('resize', function () {
    if (shell.classList.contains('visible') && rendition) rendition.resize();
  });
})();
</script>
</body>
</html>
